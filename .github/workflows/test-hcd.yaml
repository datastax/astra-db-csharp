name: Run integration tests on HCD + Data API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write # required for OIDC
  contents: read # required for actions/checkout if you use it

env:
  AWS_ECR_REGION: ${{ secrets.AWS_ECR_REGION }}
  AWS_ECR_ACCOUNT_ID: ${{ secrets.AWS_ECR_ACCOUNT_ID }}
  AWS_ECR_ROLE_NAME: ${{ secrets.AWS_ECR_ROLE_NAME }}
  AWS_ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
  AWS_ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  AWS_ECR_HCD_IMAGE_TAG: "1.2.3"

jobs:
  test:
    env:
      ASTRA_DB_TOKEN: "Cassandra:Y2Fzc2FuZHJh:Y2Fzc2FuZHJh"
      ASTRA_DB_URL: "http://localhost:8181"
      ASTRA_DB_DESTINATION: "hcd"

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ECR_ACCOUNT_ID }}:role/${{ env.AWS_ECR_ROLE_NAME }}
          aws-region: ${{ env.AWS_ECR_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull the image
        run: |
          docker pull $AWS_ECR_REGISTRY/$AWS_ECR_REPOSITORY:$AWS_ECR_HCD_IMAGE_TAG

      # TODO maybe replace this step with 'testcontainers' ?
      - name: Start HCD + Data API
        run: |
          docker compose up -d
        working-directory: docker-compose

      - name: A few seconds for the Data API to fully start
        run: sleep 10

      - name: Issue a first Data API request to create the required keyspace
        run: |
          curl -XPOST \
            ${{ env.ASTRA_DB_URL }}/v1/ \
            -H "token: ${{ env.ASTRA_DB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '
          {
              "createKeyspace": {
                  "name": "default_keyspace",
                  "options": {
                      "replication": {
                          "class": "SimpleStrategy",
                          "replication_factor": 1
                      }
                  }
              }
          }'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run integration tests
        run: |
          dotnet test ./test/DataStax.AstraDB.DataApi.IntegrationTests/ --filter "Test_DoubleAndFloatConverters"
